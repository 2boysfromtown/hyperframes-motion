<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematic Product Reveal</title>
  <link rel="stylesheet" href="../css/motion-effects.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script src="../js/text-animations.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: white;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
    }

    .scene {
      position: absolute;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
    }

    .scene.active {
      opacity: 1;
      visibility: visible;
    }

    /* Scene 1: Dramatic Opening */
    .opening-scene {
      background: radial-gradient(ellipse at 30% 20%, #1a0a2e 0%, #0a0a0a 50%, #000 100%);
    }

    .spotlight {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      animation: spotlight-move 4s ease-in-out infinite;
    }

    @keyframes spotlight-move {
      0%, 100% { transform: translate(-100px, -100px) scale(1); }
      50% { transform: translate(100px, 100px) scale(1.2); }
    }

    .brand-logo {
      font-size: 120px;
      font-weight: 900;
      letter-spacing: 20px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 80px rgba(255,255,255,0.3);
      transform-style: preserve-3d;
    }

    .tagline {
      font-size: 24px;
      letter-spacing: 8px;
      color: #00ff88;
      margin-top: 20px;
      text-transform: uppercase;
    }

    /* Scene 2: Product Showcase */
    .product-scene {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
    }

    .product-container {
      position: relative;
      width: 400px;
      height: 400px;
      perspective: 1000px;
    }

    .product-card {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      box-shadow: 
        0 0 60px rgba(0, 255, 136, 0.2),
        inset 0 0 60px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .product-icon {
      font-size: 150px;
      filter: drop-shadow(0 0 30px rgba(0, 255, 136, 0.5));
    }

    .product-badge {
      position: absolute;
      top: -20px;
      right: -20px;
      background: #00ff88;
      color: #000;
      padding: 15px 25px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.4);
    }

    .product-name {
      font-size: 48px;
      font-weight: 800;
      margin-top: 30px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .product-subtitle {
      font-size: 18px;
      color: #888;
      margin-top: 10px;
    }

    /* Scene 3: Feature Grid */
    .features-scene {
      background: #0a0a0a;
    }

    .features-title {
      font-size: 64px;
      font-weight: 800;
      margin-bottom: 60px;
      text-transform: uppercase;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      max-width: 1000px;
    }

    .feature-item {
      text-align: center;
      padding: 40px;
      background: linear-gradient(145deg, rgba(255,255,255,0.05), transparent);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .feature-icon {
      font-size: 60px;
      margin-bottom: 20px;
      display: block;
    }

    .feature-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .feature-desc {
      font-size: 16px;
      color: #888;
      line-height: 1.5;
    }

    /* Scene 4: CTA */
    .cta-scene {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #0a0a0a 100%);
    }

    .cta-title {
      font-size: 80px;
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #00ff88, #00ccff, #00ff88);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradient-shift 3s linear infinite;
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .cta-subtitle {
      font-size: 28px;
      color: #888;
      margin-bottom: 50px;
      text-align: center;
    }

    .cta-button {
      padding: 25px 60px;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      color: #000;
      font-size: 24px;
      font-weight: 700;
      border-radius: 60px;
      text-decoration: none;
      display: inline-block;
      box-shadow: 
        0 0 40px rgba(0, 255, 136, 0.4),
        0 10px 40px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease;
    }

    .cta-button:hover {
      transform: scale(1.05);
    }

    .cta-url {
      font-size: 20px;
      color: #555;
      margin-top: 30px;
      letter-spacing: 4px;
    }

    /* Particles */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 255, 136, 0.6);
      border-radius: 50%;
      animation: float-up 12s linear infinite;
    }

    @keyframes float-up {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% {
        transform: translateY(-100vh) scale(1);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Scene 1: Opening -->
  <div class="scene opening-scene" id="scene1">
    <div class="spotlight"></div>
    <div class="vignette"></div>
    <h1 class="brand-logo" id="brandLogo">BRAND</h1>
    <p class="tagline" id="tagline">The Future Is Here</p>
  </div>

  <!-- Scene 2: Product -->
  <div class="scene product-scene" id="scene2">
    <div class="product-container" id="productContainer">
      <div class="product-card" id="productCard">
        <span class="product-badge">NEW</span>
        <span class="product-icon" id="productIcon">🎒</span>
        <h2 class="product-name" id="productName">PRODUCT</h2>
        <p class="product-subtitle" id="productSubtitle">Built Different</p>
      </div>
    </div>
  </div>

  <!-- Scene 3: Features -->
  <div class="scene features-scene" id="scene3">
    <h2 class="features-title" id="featuresTitle">Why Choose Us</h2>
    <div class="features-grid" id="featuresGrid">
      <div class="feature-item">
        <span class="feature-icon">⚡</span>
        <h3 class="feature-title">Lightning Fast</h3>
        <p class="feature-desc">Optimized for speed and performance</p>
      </div>
      <div class="feature-item">
        <span class="feature-icon">🔒</span>
        <h3 class="feature-title">Secure</h3>
        <p class="feature-desc">Enterprise-grade security</p>
      </div>
      <div class="feature-item">
        <span class="feature-icon">🚀</span>
        <h3 class="feature-title">Scalable</h3>
        <p class="feature-desc">Grows with your business</p>
      </div>
    </div>
  </div>

  <!-- Scene 4: CTA -->
  <div class="scene cta-scene" id="scene4">
    <h2 class="cta-title" id="ctaTitle">Get Started</h2>
    <p class="cta-subtitle" id="ctaSubtitle">Join thousands of satisfied customers</p>
    <a href="#" class="cta-button" id="ctaButton">Buy Now</a>
    <p class="cta-url" id="ctaUrl">www.yoursite.com</p>
  </div>

  <script>
    // Create particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 5 + 's';
      particle.style.animationDuration = (8 + Math.random() * 4) + 's';
      particlesContainer.appendChild(particle);
    }

    // GSAP Timelines
    let timelines = [];
    let currentScene = 0;
    const scenes = ['scene1', 'scene2', 'scene3', 'scene4'];
    const sceneDuration = [4, 5, 5, 4]; // seconds per scene

    // Scene 1: Opening
    function createScene1() {
      const tl = gsap.timeline({ paused: true });
      
      tl.set('#scene1', { opacity: 1, visibility: 'visible' })
        .from('#brandLogo', {
          scale: 0,
          rotationY: 90,
          opacity: 0,
          duration: 1.5,
          ease: 'elastic.out(1, 0.5)'
        })
        .from('#tagline', {
          y: 50,
          opacity: 0,
          duration: 1,
          ease: 'power3.out'
        }, '-=0.5')
        .to('#brandLogo', {
          scale: 1.1,
          duration: 1,
          yoyo: true,
          repeat: 1,
          ease: 'power2.inOut'
        })
        .to('#scene1', {
          opacity: 0,
          duration: 1,
          delay: 0.5,
          onComplete: () => {
            document.getElementById('scene1').style.visibility = 'hidden';
            playScene(1);
          }
        });
      
      return tl;
    }

    // Scene 2: Product
    function createScene2() {
      const tl = gsap.timeline({ paused: true });
      
      tl.set('#scene2', { opacity: 1, visibility: 'visible' })
        .from('#productContainer', {
          z: -500,
          rotateY: 30,
          opacity: 0,
          duration: 1.5,
          ease: 'power3.out'
        })
        .from('#productIcon', {
          scale: 0,
          duration: 1,
          ease: 'back.out(1.7)'
        }, '-=0.8')
        .from('#productName', {
          y: 30,
          opacity: 0,
          duration: 0.8,
          ease: 'power3.out'
        }, '-=0.5')
        .from('#productSubtitle', {
          y: 20,
          opacity: 0,
          duration: 0.6,
          ease: 'power3.out'
        }, '-=0.4')
        .to('#productCard', {
          rotateY: 15,
          rotateX: 5,
          duration: 2,
          ease: 'power2.inOut',
          yoyo: true,
          repeat: 1
        })
        .to('#scene2', {
          opacity: 0,
          duration: 1,
          delay: 0.5,
          onComplete: () => {
            document.getElementById('scene2').style.visibility = 'hidden';
            playScene(2);
          }
        });
      
      return tl;
    }

    // Scene 3: Features
    function createScene3() {
      const tl = gsap.timeline({ paused: true });
      
      tl.set('#scene3', { opacity: 1, visibility: 'visible' })
        .from('#featuresTitle', {
          clipPath: 'inset(0 100% 0 0)',
          duration: 1,
          ease: 'power3.inOut'
        })
        .from('.feature-item', {
          y: 80,
          opacity: 0,
          scale: 0.8,
          duration: 0.8,
          stagger: 0.2,
          ease: 'back.out(1.7)'
        }, '-=0.3')
        .to('.feature-item', {
          y: -10,
          duration: 0.5,
          stagger: 0.1,
          ease: 'power2.out',
          yoyo: true,
          repeat: 1
        }, '+=0.5')
        .to('#scene3', {
          opacity: 0,
          duration: 1,
          delay: 1,
          onComplete: () => {
            document.getElementById('scene3').style.visibility = 'hidden';
            playScene(3);
          }
        });
      
      return tl;
    }

    // Scene 4: CTA
    function createScene4() {
      const tl = gsap.timeline({ paused: true });
      
      tl.set('#scene4', { opacity: 1, visibility: 'visible' })
        .from('#ctaTitle', {
          scale: 2,
          opacity: 0,
          filter: 'blur(20px)',
          duration: 1.2,
          ease: 'power3.out'
        })
        .from('#ctaSubtitle', {
          y: 30,
          opacity: 0,
          duration: 0.8,
          ease: 'power3.out'
        }, '-=0.5')
        .from('#ctaButton', {
          scale: 0,
          duration: 0.8,
          ease: 'elastic.out(1, 0.5)'
        }, '-=0.4')
        .from('#ctaUrl', {
          opacity: 0,
          letterSpacing: '20px',
          duration: 1,
          ease: 'power3.out'
        }, '-=0.3')
        .to('#ctaButton', {
          boxShadow: '0 0 60px rgba(0, 255, 136, 0.6), 0 0 100px rgba(0, 255, 136, 0.3)',
          scale: 1.05,
          duration: 0.8,
          yoyo: true,
          repeat: 3,
          ease: 'power2.inOut'
        }, '+=0.5');
      
      return tl;
    }

    // Initialize timelines
    timelines = [
      createScene1(),
      createScene2(),
      createScene3(),
      createScene4()
    ];

    // Play scene
    function playScene(index) {
      if (index < timelines.length) {
        currentScene = index;
        timelines[index].play(0);
      }
    }

    // Start animation
    window.onload = () => {
      playScene(0);
    };

    // Register for HyperFrames
    window.__timelines = timelines;
  </script>
</body>
</html>
