<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Ad</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: system-ui, sans-serif; }
    #comp { width: 1080px; height: 1920px; position: relative; }
    .scene { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
    .s1 { background: linear-gradient(135deg, #ff0080, #7928ca); }
    .big { font-size: 160px; font-weight: 900; text-transform: uppercase; letter-spacing: -5px; }
    .s2 { background: #0a0a0a; }
    .product { width: 700px; height: 700px; background: linear-gradient(145deg, #1a1a1a, #2a2a2a); border-radius: 40px; display: flex; justify-content: center; align-items: center; font-size: 300px; }
    .s3 { background: #ff0080; }
    .cta { font-size: 80px; font-weight: 900; text-transform: uppercase; text-align: center; }
    .btn { padding: 40px 100px; background: #000; color: #ff0080; font-size: 36px; font-weight: 800; border-radius: 70px; margin-top: 60px; }
  </style>
</head>
<body>
  <div id="comp" data-composition-id="social" data-width="1080" data-height="1920" data-start="0" data-duration="15">
    <div class="scene s1" id="c1"><h1 class="big">FLASH</h1><h1 class="big">SALE</h1></div>
    <div class="scene s2" id="c2"><div class="product">🎒</div></div>
    <div class="scene s3" id="c3"><h1 class="cta">50% OFF</h1><div class="btn">SHOP NOW</div></div>
  </div>
  <script>
    const t1 = gsap.timeline({ paused: true });
    t1.set('#c1', { opacity: 1, visibility: 'visible' })
      .from('.big', { scale: 0, rotation: -10, opacity: 0, duration: 0.8, stagger: 0.2, ease: 'back.out(1.7)' })
      .to('#c1', { opacity: 0, duration: 0.5, delay: 0.5 })
      .set('#c1', { visibility: 'hidden' });
    const t2 = gsap.timeline({ paused: true });
    t2.set('#c2', { opacity: 1, visibility: 'visible' })
      .from('.product', { scale: 0, rotateY: 90, duration: 1, ease: 'power3.out' })
      .to('.product', { rotateY: 20, duration: 2, yoyo: true, repeat: 2 })
      .to('#c2', { opacity: 0, duration: 0.5, delay: 0.3 })
      .set('#c2', { visibility: 'hidden' });
    const t3 = gsap.timeline({ paused: true });
    t3.set('#c3', { opacity: 1, visibility: 'visible' })
      .from('.cta', { scale: 2, opacity: 0, duration: 0.8, ease: 'power3.out' })
      .from('.btn', { y: 100, opacity: 0, duration: 0.6 }, '-=0.3');
    window.__timelines = { 'social': [t1, t2, t3] };
  </script>
</body>
</html>
