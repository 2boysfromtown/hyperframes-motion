<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Typography</title>
  <link rel="stylesheet" href="../css/motion-effects.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script src="../js/text-animations.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0a0a;
      color: white;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .scene {
      position: absolute;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
    }

    .scene.active { opacity: 1; visibility: visible; }

    /* Glitch background */
    .glitch-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(45deg, transparent 48%, rgba(255,0,128,0.03) 50%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, rgba(0,255,255,0.03) 50%, transparent 52%);
      background-size: 60px 60px;
      animation: bg-glitch 0.5s infinite;
    }

    @keyframes bg-glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-2px, -2px); }
      80% { transform: translate(2px, 2px); }
    }

    /* Typography styles */
    .big-text {
      font-size: 140px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.9;
      letter-spacing: -5px;
    }

    .medium-text {
      font-size: 80px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .accent-text {
      font-size: 60px;
      font-weight: 700;
      color: #ff0080;
      text-shadow: 0 0 40px rgba(255,0,128,0.5);
    }

    .glitch-text {
      position: relative;
      animation: text-glitch 3s infinite;
    }

    @keyframes text-glitch {
      0%, 90%, 100% { transform: translate(0); filter: none; }
      92% { transform: translate(-5px, 2px); filter: hue-rotate(90deg); }
      94% { transform: translate(5px, -2px); filter: hue-rotate(-90deg); }
      96% { transform: translate(-3px, -3px); }
      98% { transform: translate(3px, 3px); }
    }

    .char {
      display: inline-block;
      transform-origin: center bottom;
    }

    .highlight-box {
      background: linear-gradient(135deg, #ff0080, #ff8c00);
      padding: 20px 40px;
      transform: skew(-10deg);
      margin: 20px 0;
    }

    .highlight-box span {
      display: block;
      transform: skew(10deg);
      font-size: 48px;
      font-weight: 800;
    }

    .cta-pulse {
      font-size: 36px;
      padding: 20px 50px;
      background: #00ff88;
      color: #000;
      font-weight: 800;
      border-radius: 50px;
      margin-top: 40px;
      animation: pulse-glow 1.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(0,255,136,0.4); transform: scale(1); }
      50% { box-shadow: 0 0 60px rgba(0,255,136,0.8); transform: scale(1.05); }
    }

    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glitch-bg"></div>
  <div class="vignette"></div>

  <!-- Scene 1: Impact Text -->
  <div class="scene" id="scene1">
    <h1 class="big-text glitch-text" id="impact1">CREATE</h1>
  </div>

  <!-- Scene 2: Split Message -->
  <div class="scene" id="scene2">
    <h2 class="medium-text" id="dont">DON'T</h2>
    <h2 class="accent-text" id="settle">SETTLE</h2>
  </div>

  <!-- Scene 3: Highlight Box -->
  <div class="scene" id="scene3">
    <div class="highlight-box" id="highlightBox">
      <span>FOR AVERAGE</span>
    </div>
  </div>

  <!-- Scene 4: CTA -->
  <div class="scene" id="scene4">
    <h2 class="big-text" id="brand" style="font-size: 100px;">STASHED</h2>
    <div class="cta-pulse" id="cta">JOIN THE DROP →</div>
  </div>

  <script>
    // Scene 1: Impact text with character animation
    function createScene1() {
      const tl = gsap.timeline({ paused: true });
      const text = document.getElementById('impact1');
      const chars = text.textContent.split('');
      text.innerHTML = chars.map(c => `<span class="char">${c}</span>`).join('');

      tl.set('#scene1', { opacity: 1, visibility: 'visible' })
        .from('.char', {
          y: 200,
          rotation: 90,
          opacity: 0,
          duration: 0.8,
          stagger: 0.1,
          ease: 'back.out(1.7)'
        })
        .to('.char', {
          scale: 1.2,
          duration: 0.3,
          stagger: 0.05,
          ease: 'power2.out',
          yoyo: true,
          repeat: 1
        }, '+=0.2')
        .to('#scene1', {
          opacity: 0,
          scale: 1.5,
          filter: 'blur(20px)',
          duration: 0.8,
          delay: 0.5,
          onComplete: () => {
            document.getElementById('scene1').style.visibility = 'hidden';
            playScene(1);
          }
        });
      return tl;
    }

    // Scene 2: Split message
    function createScene2() {
      const tl = gsap.timeline({ paused: true });
      
      tl.set('#scene2', { opacity: 1, visibility: 'visible' })
        .from('#dont', {
          x: -window.innerWidth,
          opacity: 0,
          duration: 0.6,
          ease: 'power3.out'
        })
        .from('#settle', {
          x: window.innerWidth,
          opacity: 0,
          duration: 0.6,
          ease: 'power3.out'
        }, '-=0.4')
        .to('#settle', {
          textShadow: '0 0 80px rgba(255,0,128,0.8)',
          scale: 1.1,
          duration: 0.5,
          yoyo: true,
          repeat: 3
        }, '+=0.3')
        .to('#scene2', {
          opacity: 0,
          duration: 0.5,
          delay: 0.3,
          onComplete: () => {
            document.getElementById('scene2').style.visibility = 'hidden';
            playScene(2);
          }
        });
      return tl;
    }

    // Scene 3: Highlight box
    function createScene3() {
      const tl = gsap.timeline({ paused: true });
      
      tl.set('#scene3', { opacity: 1, visibility: 'visible' })
        .from('#highlightBox', {
          scale: 0,
          rotation: -180,
          opacity: 0,
          duration: 1,
          ease: 'elastic.out(1, 0.5)'
        })
        .to('#highlightBox', {
          skewX: -20,
          duration: 0.2,
          yoyo: true,
          repeat: 5,
          ease: 'power2.inOut'
        }, '+=0.3')
        .to('#scene3', {
          opacity: 0,
          x: -200,
          duration: 0.6,
          delay: 0.5,
          onComplete: () => {
            document.getElementById('scene3').style.visibility = 'hidden';
            playScene(3);
          }
        });
      return tl;
    }

    // Scene 4: Brand + CTA
    function createScene4() {
      const tl = gsap.timeline({ paused: true });
      const brand = document.getElementById('brand');
      const brandChars = brand.textContent.split('');
      brand.innerHTML = brandChars.map(c => `<span class="char">${c}</span>`).join('');

      tl.set('#scene4', { opacity: 1, visibility: 'visible' })
        .from('#brand .char', {
          opacity: 0,
          y: 100,
          rotationX: 90,
          duration: 0.6,
          stagger: 0.08,
          ease: 'back.out(1.7)'
        })
        .from('#cta', {
          scale: 0,
          opacity: 0,
          duration: 0.8,
          ease: 'elastic.out(1, 0.5)'
        }, '-=0.3')
        .to('#cta', {
          boxShadow: '0 0 100px rgba(0,255,136,1)',
          duration: 0.5,
          yoyo: true,
          repeat: -1
        });
      
      return tl;
    }

    const timelines = [
      createScene1(),
      createScene2(),
      createScene3(),
      createScene4()
    ];

    function playScene(index) {
      if (index < timelines.length) {
        timelines[index].play(0);
      }
    }

    window.onload = () => playScene(0);
    window.__timelines = timelines;
  </script>
</body>
</html>
